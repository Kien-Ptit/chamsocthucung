<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pet Station Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p-food: #f39c12; --p-water: #3498db; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        .section { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .title { font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        /* CSS cho Lịch trình (1) */
        .sch-item { display: flex; justify-content: space-between; background: #f9f9f9; padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 14px; }
        .btn-add { width: 100%; padding: 10px; border: 2px dashed #ccc; background: none; border-radius: 8px; cursor: pointer; color: #666; }

        /* CSS cho Nhật ký (3) */
        #log-container { font-size: 12px; color: #555; max-height: 120px; overflow-y: auto; }
        .log-line { padding: 4px 0; border-bottom: 1px dashed #eee; }
        .log-time { color: #999; font-weight: bold; margin-right: 5px; }

        /* Camera & Thống kê cũ giữ nguyên cấu trúc cũ nhưng gom lại */
        .cam-box { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .cam-box img { width: 100%; height: 100%; object-fit: cover; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #fff; padding: 10px; border-radius: 12px; text-align: center; }
        .btn-main { padding: 15px; border: none; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; flex: 1; }
    </style>
</head>
<body>
<div class="container">
    <div class="section">
        <div class="cam-box"><img id="cam-stream" src=""></div>
        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:var(--p-food)" onclick="sendAction('feed')">🦴 NHẢ HẠT</button>
            <button class="btn-main" style="background:var(--p-water)" onclick="sendAction('pump')">💦 BƠM NƯỚC</button>
        </div>
    </div>

    <div class="section">
        <div class="title">⏰ Lịch trình ăn tự động</div>
        <div id="schedule-list"></div>
        <button class="btn-add" onclick="addSchedule()">+ Thêm khung giờ mới</button>
    </div>

    <div class="section">
        <div class="title">📊 Thống kê lượng ăn (24h)</div>
        <canvas id="foodChart" height="200"></canvas>
    </div>

    <div class="section">
        <div class="title">📜 Nhật ký hệ thống</div>
        <div id="log-container"></div>
    </div>
</div>

<script>
    const HOST = location.origin.replace(/^http/, 'ws');
    const ws = new WebSocket(HOST);
    ws.binaryType = 'blob';

    let myChart;
    let schedules = [];

    // Khởi tạo Biểu đồ (Tính năng 2)
    const ctx = document.getElementById('foodChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['0h', '4h', '8h', '12h', '16h', '20h', 'Bây giờ'],
            datasets: [{ label: 'Gram', data: [0, 0, 45, 0, 30, 0, 0], borderColor: '#f39c12', tension: 0.4, fill: true, backgroundColor: 'rgba(243, 156, 18, 0.1)' }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });

    ws.onmessage = (event) => {
        if (event.data instanceof Blob) {
            document.getElementById('cam-stream').src = URL.createObjectURL(event.data);
        } else {
            let msg = JSON.parse(event.data);
            if (msg.type === 'init') {
                schedules = msg.schedules;
                renderSchedules();
                msg.activityLogs.forEach(addLogToUI);
            }
            // Tự động cập nhật biểu đồ nếu ESP32 gửi số liệu cân nặng
            if (msg.weight !== undefined) {
                myChart.data.datasets[0].data[6] = msg.weight;
                myChart.update();
            }
        }
    };

    // Tính năng 1: Lịch trình
    function renderSchedules() {
        const list = document.getElementById('schedule-list');
        list.innerHTML = schedules.map((s, i) => `
            <div class="sch-item">
                <span><b>${s.time}</b> - ${s.amount}g</span>
                <span style="color:red; cursor:pointer" onclick="removeSch(${i})">Xóa</span>
            </div>
        `).join('');
    }

    function addSchedule() {
        let time = prompt("Nhập giờ (VD: 07:30):");
        let amount = prompt("Nhập lượng hạt (Gram):");
        if(time && amount) {
            schedules.push({ time, amount });
            renderSchedules();
            ws.send(JSON.stringify({ type: 'set_schedule', data: schedules }));
            addLogToUI("Đã thêm lịch trình: " + time);
        }
    }

    function removeSch(i) {
        schedules.splice(i, 1);
        renderSchedules();
        ws.send(JSON.stringify({ type: 'set_schedule', data: schedules }));
    }

    // Tính năng 3: Nhật ký
    function addLogToUI(text) {
        const container = document.getElementById('log-container');
        const now = new Date();
        const timeStr = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
        container.innerHTML = `<div class="log-line"><span class="log-time">[${timeStr}]</span> ${text}</div>` + container.innerHTML;
        // Gửi log về server để lưu lại cho người sau vào xem
        if (!text.includes("init")) ws.send(JSON.stringify({ type: 'log', text: text }));
    }

    function sendAction(cmd) {
        ws.send(cmd);
        addLogToUI(cmd === 'feed' ? "Lệnh nhả hạt thủ công" : "Lệnh bơm nước thủ công");
    }
</script>
</body>
</html>
